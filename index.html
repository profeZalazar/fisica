<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Física | Prof. Zalazar, Juan</title>
<link rel="stylesheet" href="styles.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HERO */
  .hero {
    position: relative;
    text-align: center;
    padding: 3rem 1.5rem 3.5rem;
    overflow: hidden;
    background: linear-gradient(135deg, var(--blue-dark) 0%, #2563eb 60%, #7c3aed 100%);
    color: white;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50px; left: -50px;
    width: 220px; height: 220px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -60px;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .watermark {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
    animation: float 4s ease-in-out infinite;
  }
  .hero-content {
    position: relative;
    z-index: 1;
  }
  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 0.3rem;
  }
  .hero .hero-sub {
    font-size: 1rem;
    opacity: 0.85;
    font-weight: 600;
    margin-bottom: 0.6rem;
  }
  .hero .hero-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 0.35rem 1.2rem;
    font-size: 0.9rem;
    font-weight: 700;
    backdrop-filter: blur(4px);
  }

  /* SELECCIÓN DE CURSO */
  .course-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.5rem 3rem;
    gap: 1.5rem;
  }
  .course-heading {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
  }

  /* BOTONES DE CURSO */
  .course-buttons {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    width: 100%;
    max-width: 400px;
    align-items: center;
  }

  .course-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 100%;
    max-width: 340px;
    padding: 1.6rem 2rem;
    border-radius: 20px;
    text-decoration: none;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 28px rgba(0,0,0,0.15);
  }
  .course-btn::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }
  .course-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.22);
  }
  .course-btn:active { transform: translateY(-2px); }

  .course-btn .btn-year {
    font-size: clamp(2rem, 8vw, 2.8rem);
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
    line-height: 1;
    position: relative;
    z-index: 1;
  }
  .course-btn .btn-label {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.85);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }
  .course-btn .btn-arrow {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.7);
    position: relative;
    z-index: 1;
    margin-top: 0.3rem;
  }

  .btn-1b {
    background: linear-gradient(135deg, #059669 0%, #10b981 60%, #34d399 100%);
  }
  .btn-3b {
    background: linear-gradient(135deg, var(--blue-dark) 0%, #2563eb 60%, #7c3aed 100%);
  }

  /* PORTRAIT: botones en columna (ya es default), LANDSCAPE: en fila */
  @media (orientation: landscape) and (max-height: 600px) {
    .course-buttons {
      flex-direction: row;
      max-width: 700px;
    }
    .course-btn {
      max-width: 300px;
    }
  }

  /* Pantallas grandes: en fila también */
  @media (min-width: 700px) {
    .course-buttons {
      flex-direction: row;
      max-width: 720px;
      justify-content: center;
    }
    .course-btn {
      max-width: 300px;
      flex: 1;
    }
  }

  .divider-note {
    font-size: 0.82rem;
    color: var(--text-mid);
    text-align: center;
    max-width: 320px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="hero">
  <img src="images/profe_zalazar.webp" alt="" class="watermark">
  <div class="hero-content">
    <h1>⚛️ Física</h1>
    <p class="hero-sub">Apuntes y Guías de Estudio</p>
    <span class="hero-badge">🧑‍🏫 Prof. Zalazar, Juan</span>
  </div>
</div>

<div class="course-section">
  <p class="course-heading">📚 Seleccioná tu curso</p>

  <div class="course-buttons">
    <a href="index_1b.html" class="course-btn btn-1b">
      <span class="btn-year">1ro B</span>
      <span class="btn-label">Primer Año</span>
      <span class="btn-arrow">Ver clases →</span>
    </a>
    <a href="index_3b.html" class="course-btn btn-3b">
      <span class="btn-year">3ro B</span>
      <span class="btn-label">Tercer Año</span>
      <span class="btn-arrow">Ver clases →</span>
    </a>
  </div>

  <p class="divider-note">Ingresá al índice de tu curso para acceder al material de cada clase 🎓</p>
</div>

<footer>
  <p>⚛️ <strong>Física</strong> &nbsp;|&nbsp; <strong>Prof. Zalazar, Juan</strong></p>
  <p style="margin-top:0.4rem; font-size:0.8rem;">Material de estudio 🎓</p>
</footer>

</body>
</html>
